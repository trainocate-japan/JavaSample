# サーバーポート
server.port=8080

# RDS MySQL 接続設定 (デプロイ時に環境に合わせて変更)
spring.datasource.url=jdbc:mysql://YOUR-RDS-ENDPOINT:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=password

# ALB ヘルスチェック用に Actuator を有効化
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
